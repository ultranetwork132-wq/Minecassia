<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecassia Network</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#2a004f,#4b0082,#6a0dad,#8a2be2);
    background-size:400% 400%;
    animation:gradient 10s ease infinite;
    color:white;
    text-align:center;
    overflow:hidden;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    backdrop-filter:blur(15px);
    background:rgba(0,0,0,0.4);
    padding:50px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(138,43,226,0.6);
    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}

.logo{
    width:150px;
    margin-bottom:20px;
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0px);}
}

h1{
    font-size:48px;
    margin-bottom:10px;
    background:linear-gradient(90deg,#fff,#d8b4ff,#fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    font-size:18px;
    opacity:0.9;
    margin-bottom:25px;
}

.buttons a{
    display:inline-block;
    margin:10px;
    padding:12px 30px;
    border-radius:30px;
    text-decoration:none;
    font-size:16px;
    transition:0.3s;
    background:#8a2be2;
    color:white;
    box-shadow:0 0 20px rgba(138,43,226,0.7);
}

.buttons a:hover{
    background:#a855f7;
    box-shadow:0 0 30px rgba(168,85,247,1);
    transform:scale(1.1);
}

.ip-box{
    margin-top:20px;
    padding:10px 20px;
    border:1px solid rgba(255,255,255,0.3);
    border-radius:10px;
    font-size:16px;
    background:rgba(255,255,255,0.05);
}
</style>
</head>
<body>

<div class="container">
    <img src="logo.png" class="logo" alt="Minecassia Logo">
    <h1>MINECASSIA NETWORK</h1>
    <p>Competitive Survival Experience</p>

    <div class="buttons">
        <a href="#">Join Now</a>
        <a href="#">Discord</a>
    </div>

    <div class="ip-box">
        IP: minecassia.qzz.io<br>
        Port: 25609
    </div>
</div>

</body>
</html>
